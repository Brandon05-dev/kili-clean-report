services:
  # Frontend - React/Vite Static Site
  - type: web
    name: cleankili-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://your-backend-url.onrender.com
      - key: VITE_APP_ENV
        value: production
      - key: VITE_ENABLE_DEBUG
        value: false
      - key: VITE_APP_NAME
        value: CleanKili
      - key: VITE_APP_VERSION
        value: "1.0.0"
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_HOURS
        value: "24"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: "whatsapp:+14155238886"
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_PHONE_NUMBERS
        value: "+254700000000,+254700000001"
      - key: ADMIN_EMAILS
        value: "admin1@cleankili.com,admin2@cleankili.com"
      - key: APP_NAME
        value: "CleanKili Backend"
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "False"
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

